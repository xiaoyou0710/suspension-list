<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1000">
    <title>2026 Meta 停權事件悼念區</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --stone-text: #4a4a4a; 
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        /* 封鎖畫面樣式 */
        #blocked-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            color: red;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-size: 2rem;
        }
        
        h1 { margin-bottom: 10px; font-size: 2.5rem; }
        p.subtitle { color: #888; margin-bottom: 40px; font-size: 1.1rem; }
        
        .controls {
            margin-bottom: 50px;
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }
        input[type="text"] {
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #333;
            color: #fff;
            font-size: 16px;
            width: 350px;
        }
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            background-color: #555;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover { background-color: #777; }
        button.btn-danger { background-color: #8b0000; }

        #register-form {
            display: none;
            background: #2a2a2a;
            padding: 25px;
            border-radius: 8px;
            max-width: 450px;
            margin: 0 auto 50px auto;
            text-align: left;
            border: 1px solid #444;
        }
        #register-form div { margin-bottom: 15px; }
        #register-form label { display: block; margin-bottom: 5px; color: #ccc; }
        #register-form input { width: 100%; padding: 10px; box-sizing: border-box; background: #1a1a1a; border: 1px solid #444; color: white; }

        .graveyard-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .graveyard {
            display: grid;
            grid-template-columns: repeat(3, 300px);
            gap: 40px;
            padding-bottom: 100px;
        }

        .tombstone-wrapper {
            position: relative;
            animation: fadeIn 0.8s ease-out;
        }
        .tombstone-wrapper img { width: 100%; height: auto; display: block; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        
        .tombstone-text {
            position: absolute;
            top: 36%; left: 15%; right: 15%;
            text-align: center;
            color: var(--stone-text);
            font-family: 'Times New Roman', 'Microsoft JhengHei', serif;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.2), -1px -1px 0px rgba(0,0,0,0.4);
        }
        .tombstone-text .name { font-size: 1.4rem; margin-bottom: 10px; color: #222; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
        .tombstone-text .id { font-size: 0.95rem; margin-bottom: 10px; word-break: break-all; }
        .tombstone-text .date { font-size: 0.85rem; border-top: 1px solid #777; padding-top: 8px; margin-top: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        #loading { margin: 100px; font-size: 1.5rem; color: #666; }
    </style>
</head>
<body>

    <!-- 封鎖畫面 -->
    <div id="blocked-screen">
        <div>🚫 存取拒絕</div>
        <div style="font-size: 1rem; margin-top: 20px; color: #666;">您的設備已被禁止進入此悼念區。</div>
    </div>

    <div id="main-content">
        <h1>🕊️ 2026 Meta 停權事件悼念區</h1>
        <p class="subtitle">他們沒有違反社群守則，他們只是運氣不好。</p>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="搜尋死者名稱或 ID..." onkeyup="filterGraves()">
            <button class="btn-danger" onclick="toggleRegisterForm()">📝 登記死亡</button>
        </div>

        <div id="register-form">
            <h3 style="margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 10px;">通報罹難者</h3>
            <form id="deathForm" onsubmit="submitForm(event)">
                <div>
                    <label>死者名稱 *</label>
                    <input type="text" id="entryName" required>
                </div>
                <div>
                    <label>死者 ID *</label>
                    <input type="text" id="entryID" required>
                </div>
                <div>
                    <label>死亡時間 (年-月-日)</label>
                    <input type="text" id="entryDate" placeholder="2026-06-15">
                </div>
                <button type="submit" id="submitBtn" style="width: 100%; background-color: #4CAF50; font-weight: bold;">確認送出安葬</button>
            </form>
        </div>

        <div id="loading">正在載入名單...</div>
        
        <div class="graveyard-container">
            <div class="graveyard" id="graveyard"></div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1fNqY7jkBBoXbw5w0EqzzdvtPHI2vMfXX1Sk4co11SJ4/gviz/tq?tqx=out:csv';
        const FORM_POST_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSdBGDmLWliwRJrslJ8QW4lOtQM7_6BOYJ7V0EWUlQ-RDcP0gQ/formResponse';
        const TOMBSTONE_IMG = 'file_0000000012cc722fadf5374a54f461bd.png';
        const BANNED_WORDS_FILE = 'banned.txt';
        const BLACKLIST_FILE = 'blacklist.txt';

        let deadPeople = [];
        let bannedWords = [];
        let myUUID = "";

        // 1. 初始化 UUID
        function initUUID() {
            let uuid = localStorage.getItem('meta_funeral_uuid');
            if (!uuid) {
                uuid = 'ID-' + Math.random().toString(36).substr(2, 9).toUpperCase() + '-' + Date.now();
                localStorage.setItem('meta_funeral_uuid', uuid);
            }
            myUUID = uuid;
            console.log("Current UUID:", myUUID);
        }

        // 2. 檢查封鎖狀態
        async function checkBlacklist() {
            try {
                const response = await fetch(BLACKLIST_FILE);
                if (response.ok) {
                    const text = await response.text();
                    const blacklist = text.split('\n').map(u => u.trim());
                    if (blacklist.includes(myUUID)) {
                        document.getElementById('main-content').style.display = 'none';
                        document.getElementById('blocked-screen').style.display = 'flex';
                        return true; // 已被封鎖
                    }
                }
            } catch (e) { console.log("No blacklist found."); }
            return false;
        }

        window.onload = async () => {
            initUUID();
            const isBlocked = await checkBlacklist();
            if (isBlocked) return; // 停止後續載入

            await fetchBannedWords();
            await fetchGraves();
        };

        async function fetchBannedWords() {
            try {
                const response = await fetch(BANNED_WORDS_FILE);
                if (response.ok) {
                    const text = await response.text();
                    bannedWords = text.split('\n').map(word => word.trim()).filter(w => w);
                }
            } catch (e) {}
        }

        async function fetchGraves() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const text = await response.text();
                deadPeople = parseCSV(text);
                renderGraveyard(deadPeople);
            } catch (e) {
                document.getElementById('loading').innerText = '載入失敗。';
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const row = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
                const cleanData = row.map(val => val.replace(/^"|"$/g, '').replace(/""/g, '"'));
                result.push({
                    name: cleanData[1] || '無名氏',
                    id: cleanData[2] || '未知',
                    date: cleanData[3] || '日期不詳'
                });
            }
            return result.reverse(); 
        }

        function renderGraveyard(data) {
            const container = document.getElementById('graveyard');
            document.getElementById('loading').style.display = 'none';
            container.innerHTML = '';
            data.forEach(person => {
                const grave = document.createElement('div');
                grave.className = 'tombstone-wrapper';
                grave.innerHTML = `
                    <img src="${TOMBSTONE_IMG}">
                    <div class="tombstone-text">
                        <div class="name">${escapeHTML(person.name)}</div>
                        <div class="id">${escapeHTML(person.id)}</div>
                        <div class="date">${escapeHTML(person.date)}</div>
                    </div>
                `;
                container.appendChild(grave);
            });
        }

        function filterGraves() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = deadPeople.filter(p => 
                p.name.toLowerCase().includes(keyword) || p.id.toLowerCase().includes(keyword)
            );
            renderGraveyard(filtered);
        }

        function toggleRegisterForm() {
            const form = document.getElementById('register-form');
            form.style.display = (form.style.display === 'block') ? 'none' : 'block';
        }

        async function submitForm(e) {
            e.preventDefault();
            const name = document.getElementById('entryName').value;
            const id = document.getElementById('entryID').value;
            const date = document.getElementById('entryDate').value;
            const btn = document.getElementById('submitBtn');
            
            const fullContent = (name + id).toLowerCase();
            const hasBannedWord = bannedWords.some(word => fullContent.includes(word.toLowerCase()));

            btn.innerText = '安葬中...';
            btn.disabled = true;

            if (hasBannedWord) {
                setTimeout(() => {
                    alert('✅ 資料已送出，安葬完成！');
                    location.reload();
                }, 1000);
                return;
            }

            const formData = new URLSearchParams();
            formData.append('entry.510043352', name);
            formData.append('entry.1259375546', id);
            formData.append('entry.1128410849', date);
            formData.append('entry.1443440662', myUUID); // 傳送 UUID

            try {
                await fetch(FORM_POST_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                alert('✅ 資料已送出，安葬完成！');
                location.reload(); 
            } catch (error) {
                alert('發生錯誤。');
                btn.disabled = false;
                btn.innerText = '確認送出安葬';
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
</html>
