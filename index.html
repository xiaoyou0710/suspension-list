<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 強制設定網頁寬度，確保在手機上也能維持一排三個的電腦版格式 -->
    <meta name="viewport" content="width=1000">
    <title>2026 Meta 停權事件悼念區</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --stone-text: #4a4a4a; 
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        h1 { margin-bottom: 10px; font-size: 2.5rem; }
        p.subtitle { color: #888; margin-bottom: 40px; font-size: 1.1rem; }
        
        /* 控制面板 */
        .controls {
            margin-bottom: 50px;
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }
        input[type="text"] {
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #333;
            color: #fff;
            font-size: 16px;
            width: 350px;
        }
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            background-color: #555;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover { background-color: #777; }
        button.btn-danger { background-color: #8b0000; }
        button.btn-danger:hover { background-color: #aa0000; }

        /* 登記死亡表單 */
        #register-form {
            display: none;
            background: #2a2a2a;
            padding: 25px;
            border-radius: 8px;
            max-width: 450px;
            margin: 0 auto 50px auto;
            text-align: left;
            border: 1px solid #444;
        }
        #register-form div { margin-bottom: 15px; }
        #register-form label { display: block; margin-bottom: 5px; color: #ccc; }
        #register-form input { width: 100%; padding: 10px; box-sizing: border-box; background: #1a1a1a; border: 1px solid #444; color: white; }

        /* 墓園區域：固定三欄，寬度固定，居中顯示 */
        .graveyard-container {
            width: 100%;
            display: flex;
            justify-content: center; /* 左右留空的核心 */
        }
        .graveyard {
            display: grid;
            grid-template-columns: repeat(3, 300px); /* 永遠一排三個，每個300px寬 */
            gap: 40px;
            padding-bottom: 100px;
        }

        /* 墓碑圖片與文字疊加 */
        .tombstone-wrapper {
            position: relative;
            width: 100%;
            animation: fadeIn 0.8s ease-out;
        }
        .tombstone-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }
        
        .tombstone-text {
            position: absolute;
            top: 36%; /* 配合圖片中心位置 */
            left: 15%;
            right: 15%;
            text-align: center;
            color: var(--stone-text);
            font-family: 'Times New Roman', 'Microsoft JhengHei', serif;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.2), -1px -1px 0px rgba(0,0,0,0.4);
        }
        .tombstone-text .name { font-size: 1.4rem; margin-bottom: 10px; color: #222; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
        .tombstone-text .id { font-size: 0.95rem; margin-bottom: 10px; word-break: break-all; min-height: 1.2em; }
        .tombstone-text .date { font-size: 0.85rem; border-top: 1px solid #777; padding-top: 8px; margin-top: 5px; color: #555; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        #loading { margin: 100px; font-size: 1.5rem; color: #666; }
    </style>
</head>
<body>

    <h1>🕊️ 2026 Meta 停權事件悼念區</h1>
    <p class="subtitle">他們沒有違反社群守則，他們只是運氣不好。</p>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="搜尋死者名稱或 ID..." onkeyup="filterGraves()">
        <button class="btn-danger" onclick="toggleRegisterForm()">📝 登記死亡</button>
    </div>

    <!-- 登記表單 -->
    <div id="register-form">
        <h3 style="margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 10px;">通報罹難者</h3>
        <form id="deathForm" onsubmit="submitForm(event)">
            <div>
                <label>死者名稱 *</label>
                <input type="text" id="entryName" required placeholder="例如：王小明">
            </div>
            <div>
                <label>死者 ID *</label>
                <input type="text" id="entryID" required placeholder="例如：xiaoming123">
            </div>
            <div>
                <label>死亡時間 (年-月-日)</label>
                <input type="text" id="entryDate" placeholder="2026-06-15">
            </div>
            <button type="submit" style="width: 100%; background-color: #4CAF50; font-weight: bold;">確認送出安葬</button>
        </form>
    </div>

    <div id="loading">正在挖掘墳墓中...</div>
    
    <div class="graveyard-container">
        <div class="graveyard" id="graveyard"></div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1fNqY7jkBBoXbw5w0EqzzdvtPHI2vMfXX1Sk4co11SJ4/gviz/tq?tqx=out:csv';
        const FORM_POST_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSdBGDmLWliwRJrslJ8QW4lOtQM7_6BOYJ7V0EWUlQ-RDcP0gQ/formResponse';
        const TOMBSTONE_IMG = 'file_0000000012cc722fadf5374a54f461bd.png';

        let deadPeople = [];

        window.onload = () => fetchGraves();

        async function fetchGraves() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                if (!response.ok) throw new Error('讀取失敗');
                const text = await response.text();
                deadPeople = parseCSV(text);
                renderGraveyard(deadPeople);
            } catch (error) {
                document.getElementById('loading').innerText = '讀取失敗，請確認試算表已發佈為 CSV。';
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const row = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
                const cleanData = row.map(val => val.replace(/^"|"$/g, '').replace(/""/g, '"'));
                result.push({
                    name: cleanData[1] || '無名氏',
                    id: cleanData[2] || '未知',
                    date: cleanData[3] || '日期不詳'
                });
            }
            return result.reverse(); 
        }

        function renderGraveyard(data) {
            const container = document.getElementById('graveyard');
            document.getElementById('loading').style.display = 'none';
            container.innerHTML = '';

            data.forEach(person => {
                const grave = document.createElement('div');
                grave.className = 'tombstone-wrapper';
                // ID 直接顯示，不加「ID：」
                grave.innerHTML = `
                    <img src="${TOMBSTONE_IMG}" alt="墓碑">
                    <div class="tombstone-text">
                        <div class="name">${escapeHTML(person.name)}</div>
                        <div class="id">${escapeHTML(person.id)}</div>
                        <div class="date">${escapeHTML(person.date)}</div>
                    </div>
                `;
                container.appendChild(grave);
            });
        }

        function filterGraves() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = deadPeople.filter(p => 
                p.name.toLowerCase().includes(keyword) || 
                p.id.toLowerCase().includes(keyword)
            );
            renderGraveyard(filtered);
        }

        function toggleRegisterForm() {
            const form = document.getElementById('register-form');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }

        async function submitForm(e) {
            e.preventDefault();
            const name = document.getElementById('entryName').value;
            const id = document.getElementById('entryID').value;
            const date = document.getElementById('entryDate').value;
            const btn = e.target.querySelector('button');
            
            btn.innerText = '處理中...';
            btn.disabled = true;

            const formData = new URLSearchParams();
            formData.append('entry.510043352', name);
            formData.append('entry.1259375546', id);
            if (date) formData.append('entry.1128410849', date);

            try {
                await fetch(FORM_POST_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                alert('✅ 資料已送出，安葬完成！');
                location.reload(); 
            } catch (error) {
                alert('系統錯誤，請稍後再試。');
                btn.disabled = false;
                btn.innerText = '確認送出安葬';
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
