<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Meta 停權事件悼念區</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --stone-text: #4a4a4a; /* 墓碑上的灰色文字 */
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 { margin-bottom: 5px; font-size: 1.8rem; }
        p.subtitle { color: #888; margin-bottom: 30px; font-size: 0.9rem; }
        
        /* 控制面板 (搜尋與登記按鈕) */
        .controls {
            max-width: 800px;
            margin: 0 auto 30px auto;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        input[type="text"], input[type="date"] {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #333;
            color: #fff;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #555;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover { background-color: #777; }
        button.btn-danger { background-color: #8b0000; }
        button.btn-danger:hover { background-color: #aa0000; }

        /* 登記死亡表單區域 */
        #register-form {
            display: none;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            max-width: 400px;
            margin: 0 auto 30px auto;
            text-align: left;
            border: 1px solid #444;
        }
        #register-form div { margin-bottom: 15px; }
        #register-form label { display: block; margin-bottom: 5px; color: #ccc; font-size: 0.9rem;}
        #register-form input { width: 100%; box-sizing: border-box; }

        /* 墓園網格系統 (預設電腦版) */
        .graveyard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 單一墓碑設計 */
        .tombstone-wrapper {
            position: relative;
            width: 100%;
            animation: fadeIn 1s ease-in;
        }
        .tombstone-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.8));
        }
        
        /* 疊加在墓碑上的文字 */
        .tombstone-text {
            position: absolute;
            top: 36%; /* 根據圖片調整文字起始高度 */
            left: 15%;
            right: 15%;
            text-align: center;
            color: var(--stone-text);
            font-family: 'Times New Roman', 'Microsoft JhengHei', serif;
            font-weight: bold;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.2), -1px -1px 0px rgba(0,0,0,0.5); /* 石刻凹陷感 */
        }
        .tombstone-text .name { font-size: 1.3rem; margin-bottom: 10px; color: #222; }
        .tombstone-text .id { font-size: 0.85rem; margin-bottom: 8px; word-break: break-all; }
        .tombstone-text .date { font-size: 0.8rem; border-top: 1px solid #666; padding-top: 5px; margin-top: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 載入中動畫 */
        #loading { margin: 50px; font-size: 1.2rem; color: #888; }

        /* ====== 手機版專屬設定 (螢幕寬度小於 600px 時觸發) ====== */
        @media (max-width: 600px) {
            .graveyard {
                grid-template-columns: repeat(2, 1fr); /* 強制一排顯示兩個 (兩欄) */
                gap: 15px; /* 縮小墓碑之間的距離 */
                padding: 10px;
            }
            .controls {
                flex-direction: column; /* 搜尋框跟按鈕在手機上改為上下排列 */
            }
            
            /* 縮小手機版墓碑上的文字，避免字體撐破圖片 */
            .tombstone-text .name { 
                font-size: 1rem; 
                margin-bottom: 5px; 
            }
            .tombstone-text .id { 
                font-size: 0.7rem; 
                margin-bottom: 5px; 
            }
            .tombstone-text .date { 
                font-size: 0.65rem; 
                padding-top: 3px; 
                margin-top: 3px; 
            }
        }
    </style>
</head>
<body>

    <h1>🕊️ 2026 Meta 停權事件悼念區</h1>
    <p class="subtitle">他們沒有違反社群守則，他們只是運氣不好。</p>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="搜尋死者名稱或 ID..." onkeyup="filterGraves()">
        <button class="btn-danger" onclick="toggleRegisterForm()">📝 登記死亡</button>
    </div>

    <!-- 登記表單 -->
    <div id="register-form">
        <h3 style="margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 10px;">通報罹難者</h3>
        <form id="deathForm" onsubmit="submitForm(event)">
            <div>
                <label>死者名稱 (必填)</label>
                <input type="text" id="entryName" required>
            </div>
            <div>
                <label>死者 ID (必填)</label>
                <input type="text" id="entryID" required>
            </div>
            <div>
                <label>死亡時間 (年-月-日)</label>
                <input type="date" id="entryDate">
            </div>
            <button type="submit" style="width: 100%; background-color: #4CAF50;">送出安葬</button>
        </form>
    </div>

    <div id="loading">挖掘墳墓中，請稍候...</div>
    
    <!-- 墓碑顯示區 -->
    <div class="graveyard" id="graveyard"></div>

    <script>
        // 表單與資料庫設定
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1fNqY7jkBBoXbw5w0EqzzdvtPHI2vMfXX1Sk4co11SJ4/gviz/tq?tqx=out:csv';
        const FORM_POST_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSdBGDmLWliwRJrslJ8QW4lOtQM7_6BOYJ7V0EWUlQ-RDcP0gQ/formResponse';
        
        // 使用您指定的圖片連結
        const TOMBSTONE_IMG = 'https://ppt.cc/f7qzyx@.png?1781582025';

        let deadPeople = [];

        // 初始化：讀取資料
        window.onload = async () => {
            await fetchGraves();
        };

        // 讀取 Google Sheet CSV 資料
        async function fetchGraves() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                if (!response.ok) throw new Error('無法讀取試算表，請確認已「發佈到網路」');
                const text = await response.text();
                
                deadPeople = parseCSV(text);
                renderGraveyard(deadPeople);
            } catch (error) {
                document.getElementById('loading').innerText = '讀取失敗：' + error.message;
            }
        }

        // 簡易 CSV 解析器 (略過第一行標題)
        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            const result = [];
            // 假設欄位為: [0]時間戳記, [1]死者名稱, [2]死者ID, [3]死亡時間
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                // 處理 CSV 雙引號問題
                const row = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
                const cleanData = row.map(val => val.replace(/^"|"$/g, '').replace(/""/g, '"'));
                
                result.push({
                    name: cleanData[1] || '無名氏',
                    id: cleanData[2] || '未知ID',
                    date: cleanData[3] || '日期不詳'
                });
            }
            return result.reverse(); // 最新的在最前面
        }

        // 渲染墓園
        function renderGraveyard(data) {
            const container = document.getElementById('graveyard');
            document.getElementById('loading').style.display = 'none';
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1;">目前還沒有罹難者資料。</p>';
                return;
            }

            data.forEach(person => {
                const grave = document.createElement('div');
                grave.className = 'tombstone-wrapper';
                grave.innerHTML = `
                    <img src="${TOMBSTONE_IMG}" alt="墓碑">
                    <div class="tombstone-text">
                        <div class="name">${escapeHTML(person.name)}</div>
                        <div class="id">${escapeHTML(person.id)}</div>
                        <div class="date">${escapeHTML(person.date)}</div>
                    </div>
                `;
                container.appendChild(grave);
            });
        }

        // 搜尋過濾功能
        function filterGraves() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = deadPeople.filter(p => 
                p.name.toLowerCase().includes(keyword) || 
                p.id.toLowerCase().includes(keyword)
            );
            renderGraveyard(filtered);
        }

        // 切換顯示登記表單
        function toggleRegisterForm() {
            const form = document.getElementById('register-form');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }

        // 送出表單到 Google Forms
        async function submitForm(e) {
            e.preventDefault();
            const name = document.getElementById('entryName').value;
            const id = document.getElementById('entryID').value;
            const date = document.getElementById('entryDate').value;
            const btn = e.target.querySelector('button');
            
            btn.innerText = '安葬中...';
            btn.disabled = true;

            const formData = new URLSearchParams();
            formData.append('entry.510043352', name);
            formData.append('entry.1259375546', id);
            if (date) formData.append('entry.1128410849', date);

            try {
                // Google Form 必須使用 no-cors，否則會被瀏覽器擋下
                await fetch(FORM_POST_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                alert('✅ 已成功立碑！(重新整理網頁後即可看到)');
                e.target.reset();
                toggleRegisterForm();
                
                // 模擬本機更新，不用等 Google Sheet 同步時間
                deadPeople.unshift({ name, id, date: date || '日期不詳' });
                filterGraves(); // 重新渲染
            } catch (error) {
                alert('發送失敗，請稍後再試。');
            } finally {
                btn.innerText = '送出安葬';
                btn.disabled = false;
            }
        }

        // 預防 XSS 攻擊
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }
    </script>
</body>
  </html>
